name: SPCX Tracker

on:
  schedule:
    - cron: "0 12 * * *"      # 08:00 America/New_York (EDT) - morning brief
    - cron: "0 22 * * *"      # 18:00 America/New_York (EDT) - evening analysis
    - cron: "*/5 * * * *"     # every 5 min (GitHub minimum) - $80 target check
  workflow_dispatch:          # manual "Run workflow" button (sends a morning email as a test)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Send report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DAD_EMAIL: ${{ secrets.DAD_EMAIL }}
        run: |
          case "${{ github.event.schedule }}" in
            "0 12 * * *") python run.py morning ;;
            "0 22 * * *") python run.py evening ;;
            "*/5 * * * *") python run.py check ;;
            *) python run.py morning ;;
          esac
